<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You, My Love 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee; --blush: #f2c4c4; --rose: #c0687a;
    --deep-rose: #8b3a4a; --gold: #c9a96e; --ink: #2c1f1f; --soft: #f9eeee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); font-family: 'Montserrat', sans-serif; color: var(--ink); min-height: 100vh; overflow-x: hidden; }

  /* Petals */
  .petals-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
  .petal { position: absolute; top: -30px; font-size: 1.2rem; animation: fall linear infinite; opacity: 0.6; }
  @keyframes fall { 0% { transform: translateY(-30px) rotate(0deg) translateX(0); opacity:.7; } 100% { transform: translateY(110vh) rotate(720deg) translateX(40px); opacity:0; } }

  /* Nav */
  nav { position: sticky; top: 0; z-index: 100; background: rgba(253,246,238,0.93); backdrop-filter: blur(10px); border-bottom: 1px solid var(--blush); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--deep-rose); letter-spacing: .04em; }
  .nav-tabs { display: flex; gap: .25rem; }
  .tab-btn { background: none; border: none; cursor: pointer; padding: .5rem 1.1rem; font-family: 'Montserrat', sans-serif; font-size: .78rem; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--ink); opacity: .5; border-radius: 2rem; transition: all .2s; }
  .tab-btn.active, .tab-btn:hover { background: var(--blush); opacity: 1; color: var(--deep-rose); }

  /* Pages */
  .page { display: none; min-height: calc(100vh - 64px); padding: 3rem 2rem; position: relative; z-index: 1; }
  .page.active { display: block; animation: fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem,5vw,3.2rem); font-weight: 300; color: var(--deep-rose); text-align: center; margin-bottom: .4rem; letter-spacing: .02em; }
  .page-subtitle { text-align: center; font-size: .8rem; letter-spacing: .12em; text-transform: uppercase; color: var(--rose); margin-bottom: 2.5rem; opacity: .7; }

  /* Letters */
  .letters-wrap { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
  .letter-card { background: white; border: 1px solid var(--blush); border-radius: 4px; padding: 2.2rem 2.5rem; box-shadow: 0 4px 30px rgba(192,104,122,.08); position: relative; cursor: pointer; transition: box-shadow .2s; }
  .letter-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg,var(--blush),var(--gold),var(--blush)); border-radius: 4px 4px 0 0; }
  .letter-card:hover { box-shadow: 0 8px 40px rgba(192,104,122,.15); }
  .letter-meta { display: flex; justify-content: space-between; margin-bottom: 1.2rem; }
  .letter-to { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; color: var(--deep-rose); }
  .letter-date-lbl { font-size: .75rem; letter-spacing: .08em; color: var(--gold); }
  .letter-sep { border: none; border-top: 1px dashed var(--blush); margin: 0 0 1.2rem; }
  .letter-body-txt { font-family: 'Cormorant Garamond', serif; font-size: 1.08rem; line-height: 1.9; color: var(--ink); white-space: pre-wrap; }
  .letter-sig-txt { text-align: right; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.15rem; color: var(--deep-rose); margin-top: 1.2rem; }
  .letter-collapsed .letter-body-txt { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .read-more { display: block; text-align: right; font-size: .75rem; letter-spacing: .1em; text-transform: uppercase; color: var(--rose); margin-top: .6rem; cursor: pointer; }

  /* Photos */
  .photos-wrap { max-width: 860px; margin: 0 auto; }
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.2rem; }
  .photo-item { background: white; border: 1px solid var(--blush); border-radius: 4px; overflow: hidden; box-shadow: 0 2px 12px rgba(192,104,122,.08); transition: transform .2s, box-shadow .2s; }
  .photo-item:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(192,104,122,.14); }
  .photo-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .photo-caption { padding: .7rem 1rem; font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--ink); opacity: .75; }

  /* Flowers */
  .flowers-wrap { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
  .bouquet-card { background: white; border: 1px solid var(--blush); border-radius: 4px; padding: 2rem; box-shadow: 0 4px 30px rgba(192,104,122,.08); text-align: center; }
  .bouquet-emojis { font-size: 2.4rem; letter-spacing: .2rem; line-height: 1.8; word-break: break-word; margin-bottom: .8rem; }
  .bouquet-note { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--deep-rose); }
  .bouquet-date-lbl { font-size: .72rem; letter-spacing: .1em; color: var(--gold); margin-top: .6rem; text-transform: uppercase; }

  /* Empty state */
  .empty { text-align: center; padding: 4rem 2rem; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--ink); opacity: .35; }

  @media (max-width: 600px) {
    .nav-logo { display: none; }
    .tab-btn { padding: .5rem .75rem; font-size: .7rem; }
    .letter-card { padding: 1.5rem; }
  }
</style>
</head>
<body>
<div class="petals-container" id="petals"></div>

<nav>
  <div class="nav-logo">For You, My Love 💌</div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('letters',this)">✉ Letters</button>
    <button class="tab-btn" onclick="switchTab('photos',this)">📷 Photos</button>
    <button class="tab-btn" onclick="switchTab('flowers',this)">🌸 Flowers</button>
  </div>
</nav>


<!-- ============================================================
     ✏️  EDIT YOUR CONTENT BELOW — this is all she will see
     ============================================================ -->

<script>

// ── ✉ LETTERS ─────────────────────────────────────────────────
// Add as many letter objects as you like.
// Fields: to, date, body (use \n for new lines), sig
const LETTERS = [
  {
    to: "My dearest",
    date: "20 March 2026",
    body: "I have been thinking about you all day.\n\nEvery little thing reminds me of you — the way the light falls in the morning, the smell of coffee, the sound of rain.\n\nI am the luckiest person in the world to call you mine.",
    sig: "Forever yours 💕"
  },
  // ── copy the block above to add more letters ──
];


// ── 📷 PHOTOS ──────────────────────────────────────────────────
// Replace the src values with your actual image URLs or relative paths.
// e.g. src: "photos/beach.jpg"  if you upload a photos/ folder to GitHub
const PHOTOS = [
  {
    src: "photos/IMG_6025.jpeg",
    caption: "a little encouragement haha, i love you so much"
  },

  // ── copy the block above to add more photos ──
];


// ── 🌸 BOUQUETS ────────────────────────────────────────────────
// Build bouquets with any emoji flowers.
// flowers: any string of emojis, note: message
const BOUQUETS = [
  {
    flowers: "🌹🌷🌸🌺🌼💐",
    note: "Just because you deserve all the flowers in the world.",
    date: "20 March 2026"
  },
  // ── copy the block above to add more bouquets ──
];

</script>



<!-- LETTERS PAGE -->
<div class="page active" id="page-letters">
  <h1 class="page-title">Letters for You</h1>
  <p class="page-subtitle">Written with love</p>
  <div class="letters-wrap" id="letters-container"></div>
</div>

<!-- PHOTOS PAGE -->
<div class="page" id="page-photos">
  <h1 class="page-title">Our Memories</h1>
  <p class="page-subtitle">Every picture tells our story</p>
  <div class="photos-wrap">
    <div class="photo-grid" id="photos-container"></div>
  </div>
</div>

<!-- FLOWERS PAGE -->
<div class="page" id="page-flowers">
  <h1 class="page-title">Flowers for You</h1>
  <p class="page-subtitle">A little something to brighten your day</p>
  <div class="flowers-wrap" id="flowers-container"></div>
</div>

<script>
// ── Tab switch ──
function switchTab(tab, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  btn.classList.add('active');
}

// ── Render letters ──
(function() {
  const c = document.getElementById('letters-container');
  if (!LETTERS.length) { c.innerHTML = '<div class="empty">No letters yet… check back soon 💌</div>'; return; }
  c.innerHTML = LETTERS.map((l, i) => `
    <div class="letter-card letter-collapsed" id="lc${i}" onclick="toggleLetter(${i})">
      <div class="letter-meta">
        <div class="letter-to">To ${esc(l.to)}</div>
        <div class="letter-date-lbl">${esc(l.date)}</div>
      </div>
      <hr class="letter-sep">
      <div class="letter-body-txt">${esc(l.body)}</div>
      <div class="letter-sig-txt">— ${esc(l.sig)}</div>
      <span class="read-more" id="rm${i}">Read more ↓</span>
    </div>`).join('');
})();

function toggleLetter(i) {
  const card = document.getElementById('lc'+i);
  const rm   = document.getElementById('rm'+i);
  const collapsed = card.classList.toggle('letter-collapsed');
  rm.textContent = collapsed ? 'Read more ↓' : 'Show less ↑';
}

// ── Render photos ──
(function() {
  const c = document.getElementById('photos-container');
  if (!PHOTOS.length) { c.innerHTML = '<div class="empty" style="grid-column:1/-1">No photos yet… 📷</div>'; return; }
  c.innerHTML = PHOTOS.map(p => `
    <div class="photo-item">
      <img src="${p.src}" alt="memory" loading="lazy">
      ${p.caption ? `<div class="photo-caption">${esc(p.caption)}</div>` : ''}
    </div>`).join('');
})();

// ── Render bouquets ──
(function() {
  const c = document.getElementById('flowers-container');
  if (!BOUQUETS.length) { c.innerHTML = '<div class="empty">No bouquets yet… 🌸</div>'; return; }
  c.innerHTML = BOUQUETS.map(b => `
    <div class="bouquet-card">
      <div class="bouquet-emojis">${b.flowers}</div>
      ${b.note ? `<div class="bouquet-note">"${esc(b.note)}"</div>` : ''}
      ${b.date ? `<div class="bouquet-date-lbl">${esc(b.date)}</div>` : ''}
    </div>`).join('');
})();

// ── Petals ──
function spawnPetal() {
  const p = document.createElement('div'); p.className = 'petal';
  p.textContent = ['🌸','🌷','🌹','💮','✿','❀'][Math.floor(Math.random()*6)];
  p.style.left = Math.random()*100+'vw';
  const dur = 6+Math.random()*8;
  p.style.animationDuration = dur+'s';
  p.style.animationDelay = (-Math.random()*dur)+'s';
  p.style.fontSize = (.8+Math.random()*.8)+'rem';
  document.getElementById('petals').appendChild(p);
  setTimeout(() => p.remove(), (dur+1)*1000);
}
setInterval(spawnPetal, 700);
for (let i=0; i<6; i++) spawnPetal();

// ── Escape HTML ──
function esc(s='') { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
</script>
</body>
</html>
